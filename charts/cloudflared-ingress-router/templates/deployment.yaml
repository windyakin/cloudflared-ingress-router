apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudflared-ingress-router.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudflared-ingress-router.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cloudflared-ingress-router.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cloudflared-ingress-router.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cloudflared-ingress-router.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --account-id=$(CLOUDFLARE_ACCOUNT_ID)
            - --tunnel-id=$(CLOUDFLARE_TUNNEL_ID)
            - --annotation-prefix={{ .Values.controller.annotationPrefix }}
            - --origin-url-https={{ .Values.controller.originUrlHttps }}
            - --origin-url-http={{ .Values.controller.originUrlHttp }}
            - --resync-interval={{ .Values.controller.resyncInterval }}
            {{- if .Values.controller.leaderElect }}
            - --leader-elect
            {{- end }}
          env:
            - name: CLOUDFLARE_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudflared-ingress-router.secretName" . }}
                  key: accountId
            - name: CLOUDFLARE_TUNNEL_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudflared-ingress-router.secretName" . }}
                  key: tunnelId
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudflared-ingress-router.secretName" . }}
                  key: apiToken
          ports:
            - name: metrics
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
