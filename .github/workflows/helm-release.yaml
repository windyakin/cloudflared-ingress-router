name: Release Helm Chart

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch Chart.yaml with tag version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/cloudflared-ingress-router/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/cloudflared-ingress-router/Chart.yaml

      - name: Package chart
        run: helm package charts/cloudflared-ingress-router -d .pkg

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update repository index
        run: |
          cp .pkg/*.tgz gh-pages/
          helm repo index gh-pages --url https://windyakin.github.io/cloudflared-ingress-router

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add .
          git commit -m "Release ${{ github.ref_name }}"
          git push
